<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AGORA FM 92,5 – Downloads Oficiais</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600;700&family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --purple:       #4a3fa0;
      --purple-dark:  #322a7a;
      --purple-light: #6658d0;
      --purple-glow:  rgba(74,63,160,0.5);
      --white:        #ffffff;
      --off-white:    #f0eeff;
      --black:        #0d0b1a;
      --black-2:      #14112a;
      --black-3:      #1c1836;
      --black-4:      #231f44;
      --grey:         #6e6a90;
      --grey-lt:      #a8a4cc;
      --border:       rgba(255,255,255,0.07);
      --radius:       12px;
      --trans:        0.25s ease;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Barlow', sans-serif;
      background: var(--black);
      color: var(--white);
      min-height: 100vh;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 90% 55% at 50% -5%, rgba(74,63,160,0.38) 0%, transparent 65%),
        radial-gradient(ellipse 50% 40% at 95% 85%, rgba(74,63,160,0.12) 0%, transparent 55%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── HEADER ── */
    header {
      position: relative;
      z-index: 10;
      background: linear-gradient(135deg, #2a2270 0%, #4a3fa0 55%, #6658d0 100%);
      box-shadow: 0 6px 40px rgba(74,63,160,0.7);
      overflow: hidden;
    }
    header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        -55deg, transparent, transparent 22px,
        rgba(255,255,255,0.025) 22px, rgba(255,255,255,0.025) 44px
      );
      pointer-events: none;
    }
    .header-inner {
      position: relative;
      max-width: 1100px;
      margin: 0 auto;
      padding: 26px 28px 24px;
      display: flex;
      align-items: center;
      gap: 28px;
    }
    .logo-wrap {
      flex-shrink: 0;
      width: 160px;
      height: 100px;
      background: white;
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 6px 24px rgba(0,0,0,0.5);
    }
    .logo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      padding: 8px;
    }
    .header-text { flex: 1; }
    .station-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(38px, 6vw, 64px);
      line-height: 0.9;
      letter-spacing: 3px;
      color: #fff;
      text-shadow: 0 2px 16px rgba(0,0,0,0.35);
    }
    .station-freq { opacity: 0.8; }
    .station-slogan {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(13px, 2vw, 18px);
      font-style: italic;
      color: rgba(255,255,255,0.6);
      margin-top: 5px;
      letter-spacing: 0.5px;
    }
    .page-subtitle {
      display: inline-block;
      margin-top: 11px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(11px, 1.5vw, 14px);
      font-weight: 600;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
      border-top: 1px solid rgba(255,255,255,0.18);
      padding-top: 9px;
    }
    .header-deco {
      position: absolute;
      right: 24px; top: 50%;
      transform: translateY(-50%);
      opacity: 0.06;
      pointer-events: none;
    }
    .header-deco svg { width: 240px; height: 240px; }

    /* ── TOOLBAR ── */
    .toolbar {
      position: relative;
      z-index: 5;
      max-width: 1100px;
      margin: 36px auto 0;
      padding: 0 28px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }
    .search-wrap {
      flex: 1;
      min-width: 220px;
      position: relative;
    }
    .search-wrap .ico {
      position: absolute;
      left: 16px; top: 50%;
      transform: translateY(-50%);
      color: var(--grey);
      pointer-events: none;
      display: flex;
    }
    #searchInput {
      width: 100%;
      padding: 13px 18px 13px 48px;
      background: var(--black-3);
      border: 1px solid var(--border);
      border-radius: 50px;
      color: var(--white);
      font-family: 'Barlow', sans-serif;
      font-size: 15px;
      outline: none;
      transition: border-color var(--trans), box-shadow var(--trans);
    }
    #searchInput::placeholder { color: var(--grey); }
    #searchInput:focus {
      border-color: var(--purple-light);
      box-shadow: 0 0 0 3px rgba(102,88,208,0.22);
    }
    .counter-badge {
      flex-shrink: 0;
      background: var(--black-3);
      border: 1px solid var(--border);
      border-radius: 50px;
      padding: 10px 22px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 1px;
      color: var(--grey-lt);
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .counter-badge .count-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 24px;
      color: var(--purple-light);
      line-height: 1;
    }

    /* ── MAIN ── */
    main {
      position: relative;
      z-index: 5;
      max-width: 1100px;
      margin: 28px auto 60px;
      padding: 0 28px;
    }

    /* ── LOADER ── */
    #loader {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 90px 20px;
    }
    .spinner {
      width: 52px; height: 52px;
      border: 4px solid rgba(102,88,208,0.18);
      border-top-color: var(--purple-light);
      border-radius: 50%;
      animation: spin 0.85s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loader p {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 14px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--grey);
    }

    /* ── MENSAGEM ── */
    #msgBox {
      display: none;
      text-align: center;
      padding: 80px 20px;
    }
    #msgBox .msg-icon { font-size: 60px; margin-bottom: 18px; opacity: 0.45; }
    #msgBox h3 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 30px;
      letter-spacing: 2px;
      color: var(--grey-lt);
      margin-bottom: 10px;
    }
    #msgBox p {
      font-size: 14px;
      color: var(--grey);
      max-width: 400px;
      margin: 0 auto;
      line-height: 1.7;
    }

    /* ── GRID ── */
    #fileGrid {
      display: none;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 14px;
    }

    /* ── CARD ── */
    .file-card {
      background: var(--black-3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      display: flex;
      align-items: flex-start;
      gap: 16px;
      transition: transform var(--trans), border-color var(--trans), box-shadow var(--trans);
      animation: fadeUp 0.4s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .file-card:hover {
      transform: translateY(-3px);
      border-color: rgba(102,88,208,0.45);
      box-shadow: 0 10px 34px rgba(74,63,160,0.22);
    }
    .pdf-icon {
      flex-shrink: 0;
      width: 46px; height: 56px;
      background: linear-gradient(145deg, var(--purple-dark) 0%, var(--purple-light) 100%);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 13px;
      letter-spacing: 1px;
      color: white;
      box-shadow: 0 4px 14px rgba(74,63,160,0.45);
      position: relative;
      overflow: hidden;
    }
    .pdf-icon::after {
      content: '';
      position: absolute;
      top: 0; right: 0;
      width: 14px; height: 14px;
      background: rgba(255,255,255,0.18);
      clip-path: polygon(100% 0, 100% 100%, 0 0);
    }
    .file-info { flex: 1; min-width: 0; }
    .file-name {
      font-weight: 600;
      font-size: 14px;
      color: var(--white);
      line-height: 1.45;
      word-break: break-word;
      margin-bottom: 6px;
    }
    .file-meta {
      font-size: 12px;
      color: var(--grey);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .file-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 15px;
      border-radius: 6px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-decoration: none;
      cursor: pointer;
      border: none;
      transition: background var(--trans), transform var(--trans), box-shadow var(--trans);
    }
    .btn:active { transform: scale(0.97); }
    .btn-view {
      background: var(--purple);
      color: white;
    }
    .btn-view:hover {
      background: var(--purple-light);
      box-shadow: 0 4px 16px rgba(102,88,208,0.55);
    }
    .btn-download {
      background: rgba(255,255,255,0.07);
      color: var(--grey-lt);
      border: 1px solid var(--border);
    }
    .btn-download:hover {
      background: rgba(255,255,255,0.13);
      color: white;
    }

    /* ── FOOTER ── */
    footer {
      position: relative;
      z-index: 5;
      text-align: center;
      padding: 32px 24px;
      border-top: 1px solid var(--border);
      font-size: 13px;
      color: var(--grey);
    }
    footer strong { color: var(--purple-light); }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--black); }
    ::-webkit-scrollbar-thumb { background: var(--purple-dark); border-radius: 3px; }

    /* ── RESPONSIVO ── */
    @media (max-width: 620px) {
      .header-inner { flex-direction: column; align-items: flex-start; gap: 14px; padding: 20px; }
      .header-deco  { display: none; }
      .logo-wrap    { width: 130px; height: 82px; }
      .toolbar      { flex-direction: column; align-items: stretch; padding: 0 16px; }
      .counter-badge{ justify-content: center; }
      main          { padding: 0 16px; }
      #fileGrid     { grid-template-columns: 1fr; }
    }

    .btn-whatsapp {
      background: rgba(37,211,102,0.12);
      color: #25d366;
      border: 1px solid rgba(37,211,102,0.25);
    }
    .btn-whatsapp:hover {
      background: rgba(37,211,102,0.22);
      color: #2be870;
      border-color: rgba(37,211,102,0.5);
      box-shadow: 0 4px 14px rgba(37,211,102,0.2);
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo-wrap">
      <img id="logoImg" alt="Logo AGORA FM 92,5" />
    </div>
    <div class="header-text">
      <div class="station-name">AGORA <span class="station-freq">FM 92,5</span></div>
      <div class="station-slogan">Tudo que você quer!</div>
      <div class="page-subtitle">&#9660;&ensp;Downloads Oficiais&ensp;&#9660;</div>
    </div>
    <div class="header-deco" aria-hidden="true">
      <svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="100" cy="100" r="90" stroke="white" stroke-width="7"/>
        <circle cx="100" cy="100" r="64" stroke="white" stroke-width="5"/>
        <circle cx="100" cy="100" r="38" stroke="white" stroke-width="3.5"/>
        <circle cx="100" cy="100" r="16" fill="white"/>
      </svg>
    </div>
  </div>
</header>

<div class="toolbar">
  <div class="search-wrap">
    <span class="ico">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
    </span>
    <input type="search" id="searchInput" placeholder="Buscar arquivo por nome…" autocomplete="off" aria-label="Buscar arquivo" />
  </div>
  <div class="counter-badge" id="counterBadge" aria-live="polite">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
      <polyline points="14 2 14 8 20 8"/>
    </svg>
    <span class="count-num" id="fileCount">–</span>
    <span>arquivo(s) PDF</span>
  </div>
</div>

<main>
  <div id="loader">
    <div class="spinner"></div>
    <p>Carregando arquivos…</p>
  </div>
  <div id="msgBox" role="alert">
    <div class="msg-icon" id="msgIcon">📭</div>
    <h3 id="msgTitle">Nenhum arquivo encontrado</h3>
    <p id="msgText">Esta pasta não contém arquivos PDF no momento.</p>
  </div>
  <div id="fileGrid" role="list" aria-label="Lista de arquivos PDF"></div>
</main>

<footer>
  <strong>AGORA FM 92,5</strong> &mdash; Tudo que você quer!&ensp;|&ensp;Downloads Oficiais<br/>
  <small style="margin-top:6px;display:block;opacity:.45;">Arquivos listados automaticamente via Google Drive API</small>
</footer>

<script>
  /* ════════════════════════════════════════════════════
     ⚙️  CONFIGURAÇÃO — EDITE APENAS ESTE BLOCO
     ════════════════════════════════════════════════════

     1. GOOGLE API KEY
        ─────────────────────────────────────────────────
        a) Acesse https://console.cloud.google.com/
        b) Crie/selecione um projeto
        c) APIs e Serviços → Biblioteca → ative "Google Drive API"
        d) Credenciais → Criar credenciais → Chave de API
        e) Restrinja a chave ao domínio do GitHub Pages
           e à API "Google Drive API"
        f) Cole a chave abaixo em GOOGLE_API_KEY

     2. ID DA PASTA DO GOOGLE DRIVE
        ─────────────────────────────────────────────────
        Link da pasta:
        https://drive.google.com/drive/folders/1iqydrYDQsOEuYhSekKjPwYHD-t69qzH_
        O ID é tudo após "/folders/":
        → 1iqydrYDQsOEuYhSekKjPwYHD-t69qzH_

     3. A PASTA DEVE ESTAR COMPARTILHADA como
        "Qualquer pessoa com o link pode visualizar"

     ════════════════════════════════════════════════════ */

  const GOOGLE_API_KEY = "AIzaSyDZyXSTkryWfoVP4-QSLlB3SiZK8-wsvKU";       // 🔑 Cole sua API Key aqui
  const FOLDER_ID      = "1iqydrYDQsOEuYhSekKjPwYHD-t69qzH_"; // 📁 ID da pasta

  /* ════════════════════════════════════════════════════
     FIM DA CONFIGURAÇÃO
     ════════════════════════════════════════════════════ */

  const loader      = document.getElementById('loader');
  const fileGrid    = document.getElementById('fileGrid');
  const msgBox      = document.getElementById('msgBox');
  const msgIcon     = document.getElementById('msgIcon');
  const msgTitle    = document.getElementById('msgTitle');
  const msgText     = document.getElementById('msgText');
  const searchInput = document.getElementById('searchInput');
  const fileCount   = document.getElementById('fileCount');

  let allFiles = [];

  // Formata data legível
  function formatDate(iso) {
    if (!iso) return 'Data desconhecida';
    return new Date(iso).toLocaleDateString('pt-BR', {
      day: '2-digit', month: 'short', year: 'numeric',
      hour: '2-digit', minute: '2-digit'
    });
  }

  // Remove extensão .pdf do nome exibido
  function stripExt(name) {
    return name.replace(/\.pdf$/i, '');
  }

  // Cria card de arquivo
  function createCard(file, index) {
    const viewUrl = `https://drive.google.com/file/d/${file.id}/view`;
    const dlUrl   = `https://drive.google.com/uc?export=download&id=${file.id}`;
    const name    = stripExt(file.name);
    const date    = formatDate(file.modifiedTime);

    const card = document.createElement('div');
    card.className = 'file-card';
    card.setAttribute('role', 'listitem');
    card.style.animationDelay = `${Math.min(index * 0.055, 0.6)}s`;

    card.innerHTML = `
      <div class="pdf-icon" aria-hidden="true">PDF</div>
      <div class="file-info">
        <div class="file-name" title="${file.name}">${name}</div>
        <div class="file-meta">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/>
            <line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
          ${date}
        </div>
        <div class="file-actions">
          <a class="btn btn-view" href="${viewUrl}" target="_blank" rel="noopener" aria-label="Visualizar ${name}">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            Visualizar
          </a>
          <a class="btn btn-download" href="${dlUrl}" target="_blank" rel="noopener" aria-label="Baixar ${name}">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            Baixar
          </a>
          <a class="btn btn-whatsapp" href="#" onclick="return sendWhatsApp(event, '${file.id}', '${stripExt(file.name)}')" aria-label="Enviar via WhatsApp">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413z"/>
            </svg>
            Enviar
          </a>
        </div>
      </div>`;
    return card;
  }

  // Renderiza lista (com filtro)
  function renderFiles(files) {
    fileGrid.innerHTML = '';
    if (files.length === 0) {
      fileGrid.style.display = 'none';
      msgIcon.textContent  = '🔍';
      msgTitle.textContent = 'Nenhum resultado';
      msgText.textContent  = 'Nenhum arquivo corresponde à sua busca. Tente outro termo.';
      msgBox.style.display = 'block';
      return;
    }
    msgBox.style.display   = 'none';
    fileGrid.style.display = 'grid';
    files.forEach((f, i) => fileGrid.appendChild(createCard(f, i)));
  }

  // Filtro de busca
  searchInput.addEventListener('input', () => {
    const q = searchInput.value.trim().toLowerCase();
    renderFiles(q ? allFiles.filter(f => f.name.toLowerCase().includes(q)) : allFiles);
  });

  // Busca arquivos na Google Drive API v3
  async function fetchFiles() {
    loader.style.display   = 'flex';
    fileGrid.style.display = 'none';
    msgBox.style.display   = 'none';

    if (GOOGLE_API_KEY === "SUA_API_KEY_AQUI") {
      loader.style.display = 'none';
      msgIcon.textContent  = '⚙️';
      msgTitle.textContent = 'Configure a API Key';
      msgText.textContent  = 'Abra o index.html e insira sua Google API Key no campo GOOGLE_API_KEY. Consulte os comentários no código para o passo a passo.';
      msgBox.style.display = 'block';
      return;
    }

    const q       = encodeURIComponent(`'${FOLDER_ID}' in parents and mimeType='application/pdf' and trashed=false`);
    const fields  = encodeURIComponent('files(id,name,modifiedTime),nextPageToken');
    const orderBy = encodeURIComponent('modifiedTime desc');

    let fetched = [], pageToken = '';

    try {
      do {
        let url = `https://www.googleapis.com/drive/v3/files?q=${q}&fields=${fields}&orderBy=${orderBy}&pageSize=200&key=${GOOGLE_API_KEY}`;
        if (pageToken) url += `&pageToken=${encodeURIComponent(pageToken)}`;

        const resp = await fetch(url);
        if (!resp.ok) {
          const err = await resp.json().catch(() => ({}));
          throw new Error(err?.error?.message || `Erro HTTP ${resp.status}`);
        }
        const data = await resp.json();
        fetched    = fetched.concat(data.files || []);
        pageToken  = data.nextPageToken || '';
      } while (pageToken);

      allFiles = fetched;
      fileCount.textContent = allFiles.length;
      loader.style.display  = 'none';

      if (allFiles.length === 0) {
        msgIcon.textContent  = '📭';
        msgTitle.textContent = 'Nenhum arquivo encontrado';
        msgText.textContent  = 'Esta pasta não contém arquivos PDF no momento. Verifique se a pasta está pública e tente novamente.';
        msgBox.style.display = 'block';
        return;
      }
      renderFiles(allFiles);

    } catch (err) {
      console.error(err);
      loader.style.display = 'none';
      msgIcon.textContent  = '⚠️';
      msgTitle.textContent = 'Erro ao carregar arquivos';
      msgText.textContent  = `${err.message}. Verifique se a API Key está correta, se a Google Drive API está ativada e se a pasta é pública.`;
      msgBox.style.display = 'block';
    }
  }

  // Inicia
  fetchFiles();

  // ── Enviar via WhatsApp — abre com mensagem formatada, usuário escolhe o contato
  function sendWhatsApp(event, fileId, fileName) {
    event.preventDefault();
    event.stopPropagation();
    var fileUrl = 'https://drive.google.com/file/d/' + fileId + '/view';
    var text    = '\uD83D\uDCC4 *' + fileName + '*\n\nSegue o link para acesso ao arquivo:\n' + fileUrl;
    var waUrl   = 'https://wa.me/?text=' + encodeURIComponent(text);
    window.open(waUrl, '_blank');
    return false;
  }

</script>
